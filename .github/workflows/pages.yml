name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  # Les commits data.json sont poussés par le GITHUB_TOKEN du workflow de mise à
  # jour ; GitHub n'en déclenche volontairement PAS l'event `push` ci-dessus.
  # On redéploie donc explicitement à la fin de ce workflow.
  workflow_run:
    workflows: ["Mise à jour des températures"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; ne pas annuler une publication en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Déclenché par push/manuel, ou par une mise à jour data réussie.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "public"
      - id: deployment
        uses: actions/deploy-pages@v4
