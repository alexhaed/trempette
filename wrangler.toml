name = "trempette"
main = "worker/index.js"
compatibility_date = "2026-06-01"
workers_dev = true

# Site statique servi depuis public/ (source unique ; GitHub Pages déploie le
# même dossier pendant la transition — voir .github/workflows/pages.yml).
# run_worker_first → le Worker gère /data.json (servi depuis KV) avant les assets.
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/data.json"]

# Stockage de data.json (régénéré par le cron). Créez le namespace puis collez
# son id :  npx wrangler kv namespace create DATA
[[kv_namespaces]]
binding = "DATA"
id = "33ea916d941a4a9da24d077190b7ceea"

# Régénération toutes les 30 min.
[triggers]
crons = ["*/30 * * * *"]
