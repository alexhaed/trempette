name = "trempette"
main = "worker/index.js"
compatibility_date = "2025-01-01"
workers_dev = true

# Site statique servi par le Worker depuis public/ (qui ne contient ni
# node_modules ni outillage). run_worker_first → le Worker gère /data.json
# (servi depuis KV) avant les assets, même si un public/data.json existe.
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/data.json"]

# Stockage de data.json (régénéré par le cron). Créez le namespace puis collez
# son id :  npx wrangler kv namespace create DATA
[[kv_namespaces]]
binding = "DATA"
id = "REMPLACER_PAR_ID_KV"

# Régénération toutes les 30 min.
[triggers]
crons = ["*/30 * * * *"]
