name = "trempette"
main = "worker/index.js"
compatibility_date = "2026-06-01"
workers_dev = true

# Sert aussi l'app sur le domaine custom (zone trempette.app du compte).
routes = [{ pattern = "trempette.app", custom_domain = true }]

# Site statique servi depuis public/ (source unique).
# run_worker_first → le Worker gère /data.json (KV) et /admin (back-office) avant les assets.
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/data.json", "/admin", "/admin/*"]
# (worker/plages.html et correction.html sont importés comme texte via la règle Text par défaut de Wrangler.)

# Logs du Worker (fetch + cron) persistés et visibles dans le dashboard Cloudflare.
# invocation_logs = logs auto-générés par requête/cron (requête, réponse, métadonnées).
[observability]
enabled = true

[observability.logs]
invocation_logs = true

# Stockage de data.json (régénéré par le cron). Créez le namespace puis collez
# son id :  npx wrangler kv namespace create DATA
[[kv_namespaces]]
binding = "DATA"
id = "33ea916d941a4a9da24d077190b7ceea"

# Régénération toutes les 30 min.
[triggers]
crons = ["*/30 * * * *"]
