<!DOCTYPE html>
<!--
  Source de l'image de partage social (public/og.png, 1200x630).
  Régénérer après modification (liste des lacs, accroche…) :

    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --disable-gpu --hide-scrollbars \
      --force-device-scale-factor=1 --window-size=1200,630 \
      --screenshot=public/og.png scripts/og.html

  Puis incrémenter ?v=N sur og:image / twitter:image dans public/index.html
  (les réseaux sociaux cachent l'image par URL).
-->
<html lang="fr">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background: linear-gradient(145deg, #3FB3C0 0%, #2E8B98 52%, #2B6F73 100%);
    font-family: "Hanken Grotesk", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* Vagues décoratives en bas (rappel du logo) */
  .waves { position: absolute; left: 0; right: 0; bottom: 0; height: 300px; opacity: .22; }
  .row { position: relative; z-index: 2; display: flex; align-items: center; gap: 56px; height: 100%; padding: 0 96px; }
  .logo { width: 208px; height: 208px; border-radius: 46px; flex: none; box-shadow: 0 18px 46px rgba(0,0,0,.28); }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800; font-size: 108px; line-height: .98;
    letter-spacing: -0.035em; color: #F7F2E7;
    text-shadow: 0 3px 16px rgba(0,0,0,.16);
  }
  .tag {
    font-weight: 600; font-size: 39px; line-height: 1.22;
    color: #F7F2E7; margin-top: 14px; max-width: 660px;
    text-shadow: 0 2px 10px rgba(0,0,0,.14);
  }
  .lakes {
    font-weight: 500; font-size: 27px; letter-spacing: .012em;
    color: #CDEAEE; margin-top: 20px;
  }
</style>
</head>
<body>
  <svg class="waves" viewBox="0 0 1200 300" preserveAspectRatio="none" aria-hidden="true">
    <g fill="none" stroke="#F7F2E7" stroke-width="3" stroke-linecap="round">
      <path d="M-20 96 C 150 56, 300 136, 470 96 S 790 56, 960 96 S 1180 136, 1240 106" />
      <path d="M-20 168 C 150 128, 300 208, 470 168 S 790 128, 960 168 S 1180 208, 1240 178" />
      <path d="M-20 240 C 150 200, 300 280, 470 240 S 790 200, 960 240 S 1180 280, 1240 250" />
    </g>
  </svg>

  <div class="row">
    <img class="logo" src="../public/img/logo.png" alt="" />
    <div>
      <h1>Trempette</h1>
      <div class="tag">Température actuelle de l'eau des plages romandes</div>
      <div class="lakes">Léman · Neuchâtel · Bienne · Morat · Joux · Gruyère</div>
    </div>
  </div>
</body>
</html>
