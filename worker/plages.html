<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Éditeur des plages — Trempette</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --turq-light: #34B4C2; --turq-deep: #0E6273; --turq-deepest: #08323D;
      --creme: #F7F2E7; --coral: #F46B5A; --glacier: #BDEAF0;
      --glass: rgba(247, 242, 231, 0.08); --glass-border: rgba(247, 242, 231, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Hanken Grotesk", system-ui, sans-serif; color: var(--creme);
      background: linear-gradient(176deg, #0E6273 0%, #08323D 60%) fixed, var(--turq-deepest);
      min-height: 100vh; padding: 28px 18px 80px;
    }
    .wrap { max-width: 1000px; margin: 0 auto; position: relative; }
    .logo { width: 30px; height: 30px; border-radius: 8px; vertical-align: -7px; margin-right: 9px; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25); }
    #logout { padding: 6px 11px; font-size: 12px; }
    h1 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 24px; letter-spacing: -0.02em; margin: 0 0 4px; }
    .sub { color: var(--glacier); font-size: 13px; margin: 0 0 22px; }
    code { background: rgba(0,0,0,.2); padding: 1px 5px; border-radius: 5px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; font-size: 13px; color: var(--glacier); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky; top: 0; z-index: 1; text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--glacier);
      padding: 8px; background: var(--turq-deepest); border-bottom: 1px solid var(--glass-border); white-space: nowrap;
    }
    tbody td { padding: 5px 6px; border-bottom: 1px solid rgba(247, 242, 231, 0.07); vertical-align: middle; }
    tbody tr:hover td { background: rgba(247, 242, 231, 0.03); }
    input, select {
      width: 100%; padding: 8px 9px; font-size: 14px; font-family: inherit; color: var(--creme);
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px;
    }
    input:focus, select:focus { outline: none; border-color: var(--turq-light); }
    select option { color: #12333b; }
    .col-name input { min-width: 150px; } .col-lake select { min-width: 140px; }
    .col-group input { min-width: 120px; } .col-coord input { width: 96px; font-variant-numeric: tabular-nums; }
    .col-act { white-space: nowrap; text-align: right; }
    a.map { color: var(--glacier); text-decoration: none; font-size: 16px; padding: 0 6px; }
    a.map:hover { color: var(--creme); }
    button { font-family: inherit; cursor: pointer; border-radius: 10px; border: 1px solid var(--glass-border);
      background: var(--glass); color: var(--creme); font-size: 14px; font-weight: 600; padding: 9px 14px; }
    button:hover { background: rgba(247, 242, 231, 0.16); } button:active { transform: scale(0.98); }
    .btn-del { border: none; background: none; color: var(--coral); font-size: 18px; padding: 4px 8px; line-height: 1; }
    .btn-del:hover { background: rgba(244, 107, 90, 0.15); }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 18px 0; }
    .btn-primary { background: var(--coral); border-color: transparent; color: #fff; }
    .btn-primary:hover { background: #e35a49; }
    .count { color: var(--glacier); font-size: 13px; }
    .msg { font-size: 13px; margin: 10px 0; min-height: 1.2em; }
    .msg.err { color: #ffb3a8; } .msg.ok { color: var(--glacier); }
    .invalid { border-color: var(--coral) !important; }
    .section-title { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 16px; margin: 26px 0 10px; }
    .apphead { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .topnav { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .topnav::-webkit-scrollbar { display: none; }
    .topnav > * { flex-shrink: 0; white-space: nowrap; }
    @media (max-width: 560px) { .topnav { width: 100%; } }
    .topnav a { font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--creme); text-decoration: none; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 6px 11px; }
    .topnav a:hover { background: rgba(247, 242, 231, 0.16); }
    .topnav a.current { border-color: var(--turq-light); }
    #app { display: none; }
    .gate { max-width: 360px; margin: 12vh auto 0; text-align: center; }
    .gate input { text-align: center; margin: 14px 0; }
    .modal { position: fixed; inset: 0; z-index: 50; background: rgba(4, 20, 26, 0.6); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal[hidden] { display: none; }
    .modal-card { width: 100%; max-width: 780px; background: var(--turq-deepest); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px; font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 15px; border-bottom: 1px solid var(--glass-border); }
    #map { height: 58vh; min-height: 340px; width: 100%; background: #0b2027; }
    .leaflet-container { font-family: inherit; }
    .modal-foot { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--glass-border); flex-wrap: wrap; }
    .coords { font-variant-numeric: tabular-nums; color: var(--glacier); font-size: 13px; }
    .ext { color: var(--glacier); font-size: 13px; text-decoration: none; }
    .ext:hover { color: var(--creme); }
  </style>
</head>
<body>
  <!-- Écran de connexion (secret) -->
  <div class="wrap gate" id="gate">
    <h1><img class="logo" src="/img/logo.png" alt="" />Éditeur des plages</h1>
    <p class="sub">Accès protégé. Entre le mot de passe d'administration.</p>
    <input type="password" id="token" placeholder="Mot de passe" autocomplete="current-password" />
    <button class="btn-primary" id="login" style="width:100%">Entrer</button>
    <p class="msg err" id="gate-msg"></p>
  </div>

  <!-- Éditeur -->
  <div class="wrap" id="app">
    <div class="apphead">
      <h1><img class="logo" src="/img/logo.png" alt="" />Éditeur des plages</h1>
      <div class="topnav">
        <a href="/admin/correction">Correction biais</a>
        <a href="/admin/plages" class="current" aria-current="page">Éditeur plages</a>
        <a href="/admin/tips">Le savais-tu&nbsp;?</a>
        <a href="/admin/stats">Statistiques</a>
        <button id="logout">Déconnexion</button>
      </div>
    </div>
    <p class="sub">Modifie le catalogue puis <strong>Enregistre</strong> — la mise à jour est automatique.</p>

    <div class="toolbar">
      <span class="count" id="count"></span>
    </div>

    <table>
      <thead>
        <tr>
          <th class="col-name">Nom</th>
          <th class="col-lake">Lac</th>
          <th class="col-group">Groupe</th>
          <th class="col-coord">Latitude</th>
          <th class="col-coord">Longitude</th>
          <th class="col-act"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="actions"><button id="add">+ Ajouter une plage</button></div>

    <div class="section-title">Enregistrer</div>
    <div class="actions">
      <button id="save" class="btn-primary">Enregistrer &amp; publier</button>
      <button id="download">Télécharger le JSON</button>
    </div>
    <p class="msg" id="msg"></p>
  </div>

  <!-- Carte de positionnement (marqueur déplaçable) -->
  <div class="modal" id="mapModal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <span id="map-title"></span>
        <button id="map-close" class="btn-del" title="Fermer">✕</button>
      </div>
      <div id="map"></div>
      <div class="modal-foot">
        <span class="coords" id="map-coords">—</span>
        <span style="flex:1"></span>
        <a id="map-ext" class="ext" target="_blank" rel="noopener">Swisstopo ↗</a>
        <button id="map-cancel">Annuler</button>
        <button id="map-ok" class="btn-primary">Utiliser ces coordonnées</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    const TOKEN_KEY = "trempette_admin_token";
    let TOKEN = localStorage.getItem(TOKEN_KEY) || "";
    let LAKE_META = {};
    let rows = [];

    async function api(method, body) {
      const r = await fetch("/admin/catalogue", {
        method,
        headers: Object.assign({ "X-Admin-Token": TOKEN }, body ? { "content-type": "application/json" } : {}),
        body: body ? JSON.stringify(body) : undefined,
      });
      if (r.status === 401) throw new Error("unauthorized");
      if (!r.ok) throw new Error("HTTP " + r.status + " — " + (await r.text()).slice(0, 120));
      return r.json().catch(() => ({}));
    }

    async function start() {
      try {
        const cat = await api("GET");
        load(cat);
        $("#gate").style.display = "none";
        $("#app").style.display = "block";
      } catch (e) {
        if (e.message === "unauthorized") {
          TOKEN = "";
          localStorage.removeItem(TOKEN_KEY);
          $("#gate-msg").textContent = "Mot de passe incorrect.";
          $("#gate").style.display = "block";
          $("#app").style.display = "none";
        } else {
          $("#gate-msg").textContent = "Erreur : " + e.message;
          $("#gate").style.display = "block";
        }
      }
    }

    $("#login").addEventListener("click", () => {
      TOKEN = $("#token").value.trim();
      localStorage.setItem(TOKEN_KEY, TOKEN);
      $("#gate-msg").textContent = "";
      start();
    });
    $("#token").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#login").click(); });
    $("#logout").addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      location.reload();
    });

    function load(lakes) {
      LAKE_META = {};
      for (const lk of lakes) LAKE_META[lk.name] = { model: lk.model, lake: lk.lake };
      rows = [];
      for (const lk of lakes) {
        const groups = lk.regions
          ? lk.regions.map((r) => ({ group: r.group, beaches: r.beaches }))
          : [{ group: null, beaches: lk.beaches }];
        for (const g of groups)
          for (const b of g.beaches)
            rows.push({ id: b.id, name: b.name, lakeName: lk.name, group: g.group || "", lat: b.lat, lng: b.lng });
      }
      render();
    }

    const esc = (s) =>
      String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const lakeOptions = (sel) =>
      Object.keys(LAKE_META).map((n) => `<option${n === sel ? " selected" : ""}>${esc(n)}</option>`).join("");

    const num = (v) => { const n = parseFloat(v); return Number.isFinite(n) ? n : null; };
    function wgs84ToLv95(lat, lng) {
      const phi = (lat * 3600 - 169028.66) / 10000, lam = (lng * 3600 - 26782.5) / 10000;
      const E = 2600072.37 + 211455.93 * lam - 10938.51 * lam * phi - 0.36 * lam * phi * phi - 44.54 * lam ** 3;
      const N = 1200147.07 + 308807.95 * phi + 3745.25 * lam * lam + 76.63 * phi * phi - 194.56 * lam * lam * phi + 119.79 * phi ** 3;
      return { E: Math.round(E), N: Math.round(N) };
    }
    function mapUrl(lat, lng) {
      const la = parseFloat(lat), ln = parseFloat(lng);
      if (!Number.isFinite(la) || !Number.isFinite(ln)) return "#";
      const { E, N } = wgs84ToLv95(la, ln);
      return `https://map.geo.admin.ch/#/map?center=${E},${N}&z=14&crosshair=marker`;
    }

    const slugify = (s) =>
      String(s).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "")
        .replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");

    // Attribue un id STABLE aux plages qui n'en ont pas (nouvelles), sans jamais
    // toucher à un id existant → les favoris des utilisateurs sont préservés.
    function assignIds() {
      const used = new Set(rows.map((r) => r.id).filter(Boolean));
      for (const r of rows) {
        if (r.id) continue;
        const lake = (LAKE_META[r.lakeName] || {}).lake || "x";
        const base = `${lake}-${slugify(r.name) || "plage"}`;
        let id = base, n = 2;
        while (used.has(id)) id = `${base}-${n++}`;
        r.id = id;
        used.add(id);
      }
    }

    function render() {
      const tb = $("#rows");
      tb.innerHTML = "";
      rows.forEach((r, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="col-name"><input data-i="${i}" data-k="name" value="${esc(r.name)}" /></td>
          <td class="col-lake"><select data-i="${i}" data-k="lakeName">${lakeOptions(r.lakeName)}</select></td>
          <td class="col-group"><input data-i="${i}" data-k="group" value="${esc(r.group)}" placeholder="—" /></td>
          <td class="col-coord"><input data-i="${i}" data-k="lat" value="${esc(r.lat)}" inputmode="decimal" /></td>
          <td class="col-coord"><input data-i="${i}" data-k="lng" value="${esc(r.lng)}" inputmode="decimal" /></td>
          <td class="col-act">
            <button class="map" data-map="${i}" title="Positionner sur la carte" style="border:none;background:none;font-size:16px;cursor:pointer;padding:0 6px">📍</button>
            <button class="btn-del" data-del="${i}" title="Supprimer">✕</button>
          </td>`;
        tb.appendChild(tr);
      });
      $("#count").textContent = `${rows.length} plage${rows.length > 1 ? "s" : ""}`;
    }

    $("#rows").addEventListener("input", (e) => {
      const el = e.target, i = el.dataset.i, k = el.dataset.k;
      if (i == null) return;
      rows[i][k] = el.value;
    });
    $("#rows").addEventListener("click", (e) => {
      const del = e.target.dataset.del;
      if (del != null) {
        const nom = rows[+del]?.name?.trim() || "cette plage";
        if (confirm(`Supprimer « ${nom} » ?`)) { rows.splice(+del, 1); render(); }
        return;
      }
      const mp = e.target.dataset.map;
      if (mp != null) openMap(+mp);
    });
    $("#add").addEventListener("click", () => {
      rows.push({ name: "", lakeName: Object.keys(LAKE_META)[0] || "", group: "", lat: "", lng: "" });
      render();
      const ins = $("#rows").querySelectorAll('input[data-k="name"]');
      ins[ins.length - 1]?.focus();
    });

    function rowsToLakes() {
      assignIds();
      const order = [], byLake = new Map();
      for (const r of rows) {
        if (!byLake.has(r.lakeName)) { byLake.set(r.lakeName, []); order.push(r.lakeName); }
        byLake.get(r.lakeName).push(r);
      }
      return order.map((lakeName) => {
        const meta = LAKE_META[lakeName] || { model: "", lake: "" };
        const rs = byLake.get(lakeName);
        const go = [], bg = new Map();
        let any = false;
        for (const r of rs) {
          const g = (r.group || "").trim();
          if (g) any = true;
          if (!bg.has(g)) { bg.set(g, []); go.push(g); }
          bg.get(g).push({ id: r.id, name: r.name.trim(), lat: num(r.lat), lng: num(r.lng) });
        }
        const lk = { name: lakeName, model: meta.model, lake: meta.lake };
        if (any) lk.regions = go.map((g) => ({ group: g || null, beaches: bg.get(g) }));
        else lk.beaches = bg.get("");
        return lk;
      });
    }

    function validate() {
      const problems = [];
      document.querySelectorAll(".invalid").forEach((el) => el.classList.remove("invalid"));
      rows.forEach((r, i) => {
        const tr = $("#rows").children[i];
        if (!r.name.trim()) { problems.push(`Ligne ${i + 1} : nom vide`); tr.querySelector('[data-k="name"]').classList.add("invalid"); }
        if (num(r.lat) == null) { problems.push(`Ligne ${i + 1} : latitude`); tr.querySelector('[data-k="lat"]').classList.add("invalid"); }
        if (num(r.lng) == null) { problems.push(`Ligne ${i + 1} : longitude`); tr.querySelector('[data-k="lng"]').classList.add("invalid"); }
      });
      return problems;
    }

    function serialize(lakes) {
      const beach = (b) => `{ "id": ${JSON.stringify(b.id)}, "name": ${JSON.stringify(b.name)}, "lat": ${b.lat}, "lng": ${b.lng} }`;
      const L = ["["];
      lakes.forEach((lk, li) => {
        const lc = li < lakes.length - 1 ? "," : "";
        L.push("  {"); L.push(`    "name": ${JSON.stringify(lk.name)},`); L.push(`    "model": ${JSON.stringify(lk.model)},`);
        if (lk.regions) {
          L.push(`    "lake": ${JSON.stringify(lk.lake)},`); L.push(`    "regions": [`);
          lk.regions.forEach((r, ri) => {
            const rc = ri < lk.regions.length - 1 ? "," : "";
            L.push("      {"); L.push(`        "group": ${JSON.stringify(r.group)},`); L.push(`        "beaches": [`);
            r.beaches.forEach((b, bi) => L.push(`          ${beach(b)}${bi < r.beaches.length - 1 ? "," : ""}`));
            L.push("        ]"); L.push(`      }${rc}`);
          });
          L.push("    ]");
        } else {
          L.push(`    "lake": ${JSON.stringify(lk.lake)},`); L.push(`    "beaches": [`);
          lk.beaches.forEach((b, bi) => L.push(`      ${beach(b)}${bi < lk.beaches.length - 1 ? "," : ""}`));
          L.push("    ]");
        }
        L.push(`  }${lc}`);
      });
      L.push("]");
      return L.join("\n") + "\n";
    }

    $("#save").addEventListener("click", async () => {
      const msg = $("#msg");
      const problems = validate();
      if (problems.length) {
        msg.className = "msg err";
        msg.textContent = `${problems.length} problème(s) : ` + problems.slice(0, 4).join(" · ") + (problems.length > 4 ? "…" : "");
        return;
      }
      msg.className = "msg"; msg.textContent = "Enregistrement…";
      try {
        const res = await api("POST", rowsToLakes());
        msg.className = "msg ok";
        msg.textContent = `✓ Enregistré (${res.count ?? rows.length} plages) — données en cours de mise à jour.`;
      } catch (e) {
        msg.className = "msg err";
        msg.textContent = e.message === "unauthorized" ? "Session expirée — reconnecte-toi." : "Échec : " + e.message;
        if (e.message === "unauthorized") setTimeout(() => location.reload(), 1500);
      }
    });

    $("#download").addEventListener("click", () => {
      if (validate().length) { $("#msg").className = "msg err"; $("#msg").textContent = "Corrige les erreurs avant de télécharger."; return; }
      const blob = new Blob([serialize(rowsToLakes())], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "lakes.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // --- Carte de positionnement (Leaflet + tuiles SWISSIMAGE swisstopo) ---
    let _map = null, _marker = null, _mapRow = -1, _pick = null;

    function openMap(i) {
      _mapRow = i;
      const r = rows[i];
      const la = parseFloat(r.lat), ln = parseFloat(r.lng);
      const has = Number.isFinite(la) && Number.isFinite(ln);
      $("#map-title").textContent = (r.name || "Nouvelle plage") + " — glisse le marqueur ou clique sur la carte";
      $("#mapModal").hidden = false;
      if (!_map) {
        _map = L.map("map");
        L.tileLayer(
          "https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.swissimage/default/current/3857/{z}/{x}/{y}.jpeg",
          { maxZoom: 19, attribution: "© swisstopo" }
        ).addTo(_map);
        _map.on("click", (e) => setPick(e.latlng.lat, e.latlng.lng));
      }
      _map.setView(has ? [la, ln] : [46.8, 8.2], has ? 16 : 8);
      setTimeout(() => _map.invalidateSize(), 60);
      if (has) setPick(la, ln);
      else clearPick();
    }
    function setPick(lat, lng) {
      _pick = { lat, lng };
      if (!_marker) {
        _marker = L.marker([lat, lng], { draggable: true }).addTo(_map);
        _marker.on("dragend", () => { const p = _marker.getLatLng(); setPick(p.lat, p.lng); });
      } else {
        _marker.setLatLng([lat, lng]);
      }
      $("#map-coords").textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      $("#map-ext").href = mapUrl(lat, lng);
    }
    function clearPick() {
      _pick = null;
      if (_marker) { _map.removeLayer(_marker); _marker = null; }
      $("#map-coords").textContent = "Clique sur la carte pour placer le point";
      $("#map-ext").removeAttribute("href");
    }
    function closeMap() { $("#mapModal").hidden = true; }
    $("#map-close").addEventListener("click", closeMap);
    $("#map-cancel").addEventListener("click", closeMap);
    $("#mapModal").addEventListener("click", (e) => { if (e.target.id === "mapModal") closeMap(); });
    $("#map-ok").addEventListener("click", () => {
      if (_pick && _mapRow >= 0) {
        rows[_mapRow].lat = +_pick.lat.toFixed(4);
        rows[_mapRow].lng = +_pick.lng.toFixed(4);
        render();
      }
      closeMap();
    });

    // Démarrage : si un token est déjà en mémoire, on tente directement.
    if (TOKEN) start();
    else $("#token").focus();
  </script>
</body>
</html>
