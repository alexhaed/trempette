<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Éditeur des plages — Trempette</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --turq-light: #34B4C2;
      --turq-deep: #0E6273;
      --turq-deepest: #08323D;
      --creme: #F7F2E7;
      --coral: #F46B5A;
      --glacier: #BDEAF0;
      --glass: rgba(247, 242, 231, 0.08);
      --glass-border: rgba(247, 242, 231, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hanken Grotesk", system-ui, sans-serif;
      color: var(--creme);
      background: linear-gradient(176deg, #0E6273 0%, #08323D 60%) fixed, var(--turq-deepest);
      min-height: 100vh;
      padding: 28px 18px 80px;
    }
    .wrap { max-width: 1000px; margin: 0 auto; }
    h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 800; font-size: 24px; letter-spacing: -0.02em; margin: 0 0 4px;
    }
    .sub { color: var(--glacier); font-size: 13px; margin: 0 0 22px; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      margin-bottom: 16px; font-size: 13px; color: var(--glacier);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky; top: 0; z-index: 1;
      text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--glacier);
      padding: 8px 8px; background: var(--turq-deepest);
      border-bottom: 1px solid var(--glass-border);
      white-space: nowrap;
    }
    tbody td { padding: 5px 6px; border-bottom: 1px solid rgba(247, 242, 231, 0.07); vertical-align: middle; }
    tbody tr:hover td { background: rgba(247, 242, 231, 0.03); }
    input, select {
      width: 100%; padding: 8px 9px; font-size: 14px; font-family: inherit;
      color: var(--creme); background: var(--glass);
      border: 1px solid var(--glass-border); border-radius: 8px;
    }
    input:focus, select:focus { outline: none; border-color: var(--turq-light); }
    select option { color: #12333b; }
    .col-name input { min-width: 150px; }
    .col-lake select { min-width: 140px; }
    .col-group input { min-width: 120px; }
    .col-coord input { width: 96px; font-variant-numeric: tabular-nums; }
    .col-act { white-space: nowrap; text-align: right; }
    a.map { color: var(--glacier); text-decoration: none; font-size: 16px; padding: 0 6px; }
    a.map:hover { color: var(--creme); }
    button {
      font-family: inherit; cursor: pointer; border-radius: 10px;
      border: 1px solid var(--glass-border); background: var(--glass);
      color: var(--creme); font-size: 14px; font-weight: 600; padding: 9px 14px;
    }
    button:hover { background: rgba(247, 242, 231, 0.16); }
    button:active { transform: scale(0.98); }
    .btn-del {
      border: none; background: none; color: var(--coral);
      font-size: 18px; padding: 4px 8px; line-height: 1;
    }
    .btn-del:hover { background: rgba(244, 107, 90, 0.15); }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 18px 0; }
    .btn-primary { background: var(--coral); border-color: transparent; color: #fff; }
    .btn-primary:hover { background: #e35a49; }
    .count { color: var(--glacier); font-size: 13px; }
    .file-label {
      font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 10px;
      border: 1px solid var(--glass-border); background: var(--glass);
    }
    .file-label input { display: none; }
    #out {
      width: 100%; min-height: 280px; margin-top: 14px; padding: 14px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px;
      color: var(--creme); background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--glass-border); border-radius: 12px; white-space: pre;
    }
    .msg { font-size: 13px; margin: 10px 0; min-height: 1.2em; }
    .msg.err { color: #ffb3a8; }
    .msg.ok { color: var(--glacier); }
    .invalid { border-color: var(--coral) !important; }
    .section-title { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 16px; margin: 26px 0 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌊 Éditeur des plages</h1>
    <p class="sub">Outil local (non publié). Édite le catalogue, puis régénère <code>scripts/lakes.json</code>.</p>

    <div class="toolbar">
      <span class="count" id="count"></span>
      <label class="file-label">Charger un lakes.json…<input type="file" id="file" accept=".json,application/json" /></label>
    </div>

    <table>
      <thead>
        <tr>
          <th class="col-name">Nom</th>
          <th class="col-lake">Lac</th>
          <th class="col-group">Groupe</th>
          <th class="col-coord">Latitude</th>
          <th class="col-coord">Longitude</th>
          <th class="col-act"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="actions">
      <button id="add">+ Ajouter une plage</button>
    </div>

    <div class="section-title">Générer le fichier</div>
    <div class="actions">
      <button id="gen" class="btn-primary">Générer le lakes.json</button>
      <button id="download">Télécharger</button>
      <button id="copy">Copier</button>
    </div>
    <p class="msg" id="msg"></p>
    <textarea id="out" readonly placeholder="Le JSON généré apparaîtra ici."></textarea>
    <p class="sub" style="margin-top:14px">Remplace ensuite <code>scripts/lakes.json</code> par ce contenu et pousse — le prochain run reconstruira tout.</p>
  </div>

  <script>
    // Catalogue courant embarqué (fonctionne en double-cliquant le fichier).
    const DATA = [
      { "name": "Léman", "model": "delft3d-flow", "lake": "geneva", "regions": [
        { "group": "Genève / La Côte", "beaches": [
          { "name": "Bains des Pâquis", "lat": 46.211, "lng": 6.1545 },
          { "name": "Genève-Plage", "lat": 46.2126, "lng": 6.17 },
          { "name": "Versoix", "lat": 46.287, "lng": 6.175 },
          { "name": "Nyon", "lat": 46.378, "lng": 6.2411 },
          { "name": "Rolle", "lat": 46.456, "lng": 6.34 },
          { "name": "Morges", "lat": 46.503, "lng": 6.498 },
          { "name": "Saint-Sulpice", "lat": 46.5062, "lng": 6.5575 },
          { "name": "Préverenges", "lat": 46.5079, "lng": 6.5331 } ] },
        { "group": "Lausanne / Lavaux", "beaches": [
          { "name": "Vidy", "lat": 46.508, "lng": 6.601 },
          { "name": "Ouchy", "lat": 46.504, "lng": 6.627 },
          { "name": "Pully", "lat": 46.504, "lng": 6.663 },
          { "name": "Lutry", "lat": 46.501, "lng": 6.688 },
          { "name": "Cully", "lat": 46.485, "lng": 6.73 } ] },
        { "group": "Riviera / Chablais", "beaches": [
          { "name": "Vevey", "lat": 46.456, "lng": 6.846 },
          { "name": "La Tour-de-Peilz", "lat": 46.4494, "lng": 6.8564 },
          { "name": "Montreux", "lat": 46.4321, "lng": 6.9071 },
          { "name": "Villeneuve", "lat": 46.3979, "lng": 6.9213 },
          { "name": "Le Bouveret", "lat": 46.3872, "lng": 6.8559 } ] },
        { "group": "France", "beaches": [
          { "name": "Yvoire", "lat": 46.3716, "lng": 6.3297 },
          { "name": "Excenevex", "lat": 46.367, "lng": 6.3601 },
          { "name": "Thonon-les-Bains", "lat": 46.3774, "lng": 6.4769 },
          { "name": "Évian-les-Bains", "lat": 46.4038, "lng": 6.588 } ] }
      ] },
      { "name": "Lac de Neuchâtel", "model": "mitgcm", "lake": "neuchatel", "beaches": [
        { "name": "Neuchâtel", "lat": 46.995, "lng": 6.9507 },
        { "name": "Pointe du Grain", "lat": 46.9254, "lng": 6.8325 },
        { "name": "Grandson", "lat": 46.8097, "lng": 6.6532 },
        { "name": "Yverdon-les-Bains", "lat": 46.7868, "lng": 6.655 },
        { "name": "Yvonand", "lat": 46.808, "lng": 6.738 },
        { "name": "Cheyres", "lat": 46.8099, "lng": 6.7659 },
        { "name": "Estavayer-le-Lac", "lat": 46.8542, "lng": 6.8411 },
        { "name": "Portalban", "lat": 46.928, "lng": 6.945 },
        { "name": "Cudrefin", "lat": 46.9577, "lng": 7.0106 } ] },
      { "name": "Lac de Bienne", "model": "delft3d-flow", "lake": "biel", "beaches": [
        { "name": "Bienne", "lat": 47.1301, "lng": 7.2236 },
        { "name": "Douanne", "lat": 47.0924, "lng": 7.1587 },
        { "name": "La Neuveville", "lat": 47.0648, "lng": 7.1096 } ] },
      { "name": "Lac de Morat", "model": "delft3d-flow", "lake": "murten", "beaches": [
        { "name": "Morat", "lat": 46.929, "lng": 7.108 },
        { "name": "Avenches", "lat": 46.918, "lng": 7.05 },
        { "name": "Praz (Vully)", "lat": 46.945, "lng": 7.085 } ] },
      { "name": "Lac de Joux", "model": "delft3d-flow", "lake": "joux", "beaches": [
        { "name": "Le Pont", "lat": 46.666, "lng": 6.321 },
        { "name": "L'Abbaye", "lat": 46.648, "lng": 6.295 },
        { "name": "Le Rocheray", "lat": 46.6209, "lng": 6.25 } ] }
    ];

    let LAKE_META = {}; // nom du lac → { model, lake }
    let rows = [];      // { name, lakeName, group, lat, lng }

    const $ = (s) => document.querySelector(s);

    function load(lakes) {
      LAKE_META = {};
      for (const lk of lakes) LAKE_META[lk.name] = { model: lk.model, lake: lk.lake };
      rows = [];
      for (const lk of lakes) {
        const groups = lk.regions
          ? lk.regions.map((r) => ({ group: r.group, beaches: r.beaches }))
          : [{ group: null, beaches: lk.beaches }];
        for (const g of groups)
          for (const b of g.beaches)
            rows.push({ name: b.name, lakeName: lk.name, group: g.group || "", lat: b.lat, lng: b.lng });
      }
      render();
    }

    function lakeOptions(selected) {
      return Object.keys(LAKE_META)
        .map((n) => `<option${n === selected ? " selected" : ""}>${esc(n)}</option>`)
        .join("");
    }
    function esc(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function render() {
      const tb = $("#rows");
      tb.innerHTML = "";
      rows.forEach((r, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="col-name"><input data-i="${i}" data-k="name" value="${esc(r.name)}" /></td>
          <td class="col-lake"><select data-i="${i}" data-k="lakeName">${lakeOptions(r.lakeName)}</select></td>
          <td class="col-group"><input data-i="${i}" data-k="group" value="${esc(r.group)}" placeholder="—" /></td>
          <td class="col-coord"><input data-i="${i}" data-k="lat" value="${esc(r.lat)}" inputmode="decimal" /></td>
          <td class="col-coord"><input data-i="${i}" data-k="lng" value="${esc(r.lng)}" inputmode="decimal" /></td>
          <td class="col-act">
            <a class="map" title="Voir sur OpenStreetMap" target="_blank" rel="noopener"
               href="https://www.openstreetmap.org/?mlat=${r.lat}&mlon=${r.lng}#map=15/${r.lat}/${r.lng}">📍</a>
            <button class="btn-del" data-del="${i}" title="Supprimer">✕</button>
          </td>`;
        tb.appendChild(tr);
      });
      $("#count").textContent = `${rows.length} plage${rows.length > 1 ? "s" : ""}`;
    }

    // Édition en direct des cellules.
    $("#rows").addEventListener("input", (e) => {
      const el = e.target;
      const i = el.dataset.i, k = el.dataset.k;
      if (i == null) return;
      rows[i][k] = el.value;
      if (k === "lat" || k === "lng") {
        const map = el.closest("tr").querySelector("a.map");
        map.href = `https://www.openstreetmap.org/?mlat=${rows[i].lat}&mlon=${rows[i].lng}#map=15/${rows[i].lat}/${rows[i].lng}`;
      }
    });
    $("#rows").addEventListener("click", (e) => {
      const d = e.target.dataset.del;
      if (d == null) return;
      rows.splice(+d, 1);
      render();
    });

    $("#add").addEventListener("click", () => {
      const firstLake = Object.keys(LAKE_META)[0] || "";
      rows.push({ name: "", lakeName: firstLake, group: "", lat: "", lng: "" });
      render();
      const inputs = $("#rows").querySelectorAll('input[data-k="name"]');
      inputs[inputs.length - 1]?.focus();
    });

    // Reconstruit la structure imbriquée (lacs → régions/plages) et l'écrit au
    // format compact du fichier d'origine.
    function rowsToLakes() {
      const order = [];
      const byLake = new Map();
      for (const r of rows) {
        if (!byLake.has(r.lakeName)) {
          byLake.set(r.lakeName, []);
          order.push(r.lakeName);
        }
        byLake.get(r.lakeName).push(r);
      }
      return order.map((lakeName) => {
        const meta = LAKE_META[lakeName] || { model: "", lake: "" };
        const rs = byLake.get(lakeName);
        const groupOrder = [];
        const byGroup = new Map();
        let anyGroup = false;
        for (const r of rs) {
          const g = (r.group || "").trim();
          if (g) anyGroup = true;
          if (!byGroup.has(g)) {
            byGroup.set(g, []);
            groupOrder.push(g);
          }
          byGroup.get(g).push({ name: r.name.trim(), lat: num(r.lat), lng: num(r.lng) });
        }
        const lk = { name: lakeName, model: meta.model, lake: meta.lake };
        if (anyGroup) {
          lk.regions = groupOrder.map((g) => ({ group: g || null, beaches: byGroup.get(g) }));
        } else {
          lk.beaches = byGroup.get("");
        }
        return lk;
      });
    }
    const num = (v) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : null;
    };

    function serialize(lakes) {
      const beach = (b) => `{ "name": ${JSON.stringify(b.name)}, "lat": ${b.lat}, "lng": ${b.lng} }`;
      const L = ["["];
      lakes.forEach((lk, li) => {
        const lc = li < lakes.length - 1 ? "," : "";
        L.push("  {");
        L.push(`    "name": ${JSON.stringify(lk.name)},`);
        L.push(`    "model": ${JSON.stringify(lk.model)},`);
        if (lk.regions) {
          L.push(`    "lake": ${JSON.stringify(lk.lake)},`);
          L.push(`    "regions": [`);
          lk.regions.forEach((r, ri) => {
            const rc = ri < lk.regions.length - 1 ? "," : "";
            L.push("      {");
            L.push(`        "group": ${JSON.stringify(r.group)},`);
            L.push(`        "beaches": [`);
            r.beaches.forEach((b, bi) => L.push(`          ${beach(b)}${bi < r.beaches.length - 1 ? "," : ""}`));
            L.push("        ]");
            L.push(`      }${rc}`);
          });
          L.push("    ]");
        } else {
          L.push(`    "lake": ${JSON.stringify(lk.lake)},`);
          L.push(`    "beaches": [`);
          lk.beaches.forEach((b, bi) => L.push(`      ${beach(b)}${bi < lk.beaches.length - 1 ? "," : ""}`));
          L.push("    ]");
        }
        L.push(`  }${lc}`);
      });
      L.push("]");
      return L.join("\n") + "\n";
    }

    function validate() {
      const problems = [];
      document.querySelectorAll(".invalid").forEach((el) => el.classList.remove("invalid"));
      rows.forEach((r, i) => {
        const tr = $("#rows").children[i];
        if (!r.name.trim()) {
          problems.push(`Ligne ${i + 1} : nom vide`);
          tr.querySelector('[data-k="name"]').classList.add("invalid");
        }
        if (num(r.lat) == null) {
          problems.push(`Ligne ${i + 1} : latitude invalide`);
          tr.querySelector('[data-k="lat"]').classList.add("invalid");
        }
        if (num(r.lng) == null) {
          problems.push(`Ligne ${i + 1} : longitude invalide`);
          tr.querySelector('[data-k="lng"]').classList.add("invalid");
        }
      });
      return problems;
    }

    $("#gen").addEventListener("click", () => {
      const msg = $("#msg");
      const problems = validate();
      if (problems.length) {
        msg.className = "msg err";
        msg.textContent = `${problems.length} problème(s) : ` + problems.slice(0, 4).join(" · ") + (problems.length > 4 ? "…" : "");
        return;
      }
      $("#out").value = serialize(rowsToLakes());
      msg.className = "msg ok";
      msg.textContent = `✓ ${rows.length} plages — JSON généré.`;
    });

    $("#download").addEventListener("click", () => {
      const text = $("#out").value || serialize(rowsToLakes());
      const blob = new Blob([text], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "lakes.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    $("#copy").addEventListener("click", async () => {
      const text = $("#out").value || serialize(rowsToLakes());
      try {
        await navigator.clipboard.writeText(text);
        $("#msg").className = "msg ok";
        $("#msg").textContent = "✓ Copié dans le presse-papier.";
      } catch {
        $("#out").select();
      }
    });

    $("#file").addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          load(JSON.parse(reader.result));
          $("#msg").className = "msg ok";
          $("#msg").textContent = `✓ Chargé : ${f.name}`;
        } catch (err) {
          $("#msg").className = "msg err";
          $("#msg").textContent = "Fichier JSON invalide : " + err.message;
        }
      };
      reader.readAsText(f);
    });

    load(DATA);
  </script>
</body>
</html>
